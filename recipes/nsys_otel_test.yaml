name: branch_test_dep4x1_tep8x2_osl1_bench_conc2_kv_metrics

model:
  path: kimi-k25-nvfp4
  container: dyn-100-trtllm-rc8-metrics
  precision: fp4

profiling:
  type: nsys-time
  delay_secs: 400        # seconds from worker launch before capture starts (covers weight loading + autotuner)
  duration_secs: 30      # capture window length — same on all workers for aligned P/D profiles
  benchmark_duration_secs: 500  # must be > delay_secs + duration_secs

resources:
  gpu_type: gb200
  prefill_nodes: 1
  prefill_workers: 1
  gpus_per_prefill: 4
  decode_nodes: 4
  decode_workers: 2
  gpus_per_decode: 8
  gpus_per_node: 4
backend:
  type: trtllm
  prefill_environment:
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"
    NCCL_GRAPH_MIXING_SUPPORT: "0"
    # TRTLLM_ENABLE_PDL: "1"
    TLLM_SPEC_DECODE_FORCE_NUM_ACCEPTED_TOKENS: "2"
    OTEL_EXPORT_ENABLED: "1"
    OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://10.57.209.4:4317"
    OTEL_SERVICE_NAME: "dynamo-prefill-conc2"
    DYN_LOGGING_JSONL: "1"
  decode_environment:
    TLLM_LOG_LEVEL: INFO
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"
    # TRTLLM_ENABLE_PDL: "1"
    NCCL_GRAPH_MIXING_SUPPORT: "0"
    TRTLLM_FORCE_COMM_METHOD: NVLINK_TWO_SIDED
    ENABLE_CONFIGURABLE_MOE: "1"
    TLLM_OVERRIDE_LAYER_NUM: "61"
    TLLM_SPEC_DECODE_FORCE_NUM_ACCEPTED_TOKENS: "2"
    OTEL_EXPORT_ENABLED: "1"
    OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://10.57.209.4:4317"
    OTEL_SERVICE_NAME: "dynamo-decode-conc2"
    DYN_LOGGING_JSONL: "1"
  trtllm_config:
    prefill:
      otlp_traces_endpoint: "http://10.57.209.4:4317"
      cache_transceiver_config:
        backend: UCX
        max_tokens_in_buffer: 120000
      max_batch_size: 2
      max_num_tokens: 8192
      enable_chunked_prefill: true
      max_seq_len: 120000
      tensor_parallel_size: 4
      moe_expert_parallel_size: 4
      enable_attention_dp: true
      pipeline_parallel_size: 1
      num_postprocess_workers: 4
      print_iter_log: true
      stream_interval: 1
      trust_remote_code: true
      cuda_graph_config: null
      disable_overlap_scheduler: true
      moe_config:
        backend: TRTLLM
      kv_cache_config:
        enable_block_reuse: true
        free_gpu_memory_fraction: 0.6
        dtype: fp8
        tokens_per_block: 32
    decode:
      otlp_traces_endpoint: "http://10.57.209.4:4317"
      allreduce_strategy: MNNVL
      cache_transceiver_config:
        backend: UCX
        max_tokens_in_buffer: 120000
      max_num_tokens: 4
      disable_overlap_scheduler: false
      enable_lm_head_tp_in_adp: false
      cuda_graph_config:
        batch_sizes:
        - 1
        - 2
        enable_padding: true
      enable_attention_dp: false
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: true
        free_gpu_memory_fraction: 0.75
      max_batch_size: 2
      max_seq_len: 120000
      moe_config:
        backend: TRTLLM
        use_low_precision_moe_combine: true
      nvfp4_gemm_config:
        allowed_backends:
          - cutlass
          - cublaslt
          - cutedsl
          - cuda_core
      moe_expert_parallel_size: 8
      num_postprocess_workers: 4
      print_iter_log: true
      stream_interval: 100
      tensor_parallel_size: 8
      trust_remote_code: true
frontend:
  type: dynamo
  args:
    router-mode: kv
    router-reset-states: true
  enable_multiple_frontends: false
  env:
    DYN_LOGGING_JSONL: "1"
    OTEL_EXPORT_ENABLED: "1"
    OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://10.57.209.4:4317"
    OTEL_SERVICE_NAME: "dynamo-frontend-conc2"

health_check:
  max_attempts: 500
  interval_seconds: 10

dynamo:
  install: false

infra:
  etcd_nats_dedicated_node: true

benchmark:
  type: trace-replay
  trace_file: traces/together-ai-basic-no-delays_119k_osl5/dataset.jsonl
  concurrencies: [2] #[1, 2, 4, 6, 8]
  ttft_threshold_ms: 3000
  itl_threshold_ms: 7