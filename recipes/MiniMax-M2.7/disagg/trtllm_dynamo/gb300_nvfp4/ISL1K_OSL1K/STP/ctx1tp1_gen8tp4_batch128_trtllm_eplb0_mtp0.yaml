benchmark:
  type: sa-bench
  isl: 1024
  osl: 1024
  concurrencies: '128'
  req_rate: inf
  random_range_ratio: 0.8
  num_prompts_mult: 10
  num_warmup_mult: 2
  use_chat_template: false
frontend:
  type: dynamo
  enable_multiple_frontends: false
health_check:
  max_attempts: 720
  interval_seconds: 10
dynamo:
