# 10th point (E2E_C192) for exp3 8k1k mtp0 srt-slurm, variant-1 transforms at 1.5x sysc (=288).
# Rate-matched combo (NO e2e baseline run): 1 ctx DEP4 + 3 gen TEP4 = 16 GPU / 4 nodes.
# CTX source: scripts/configs/ctx-only 1ctxDEP4_1genDEP4_cutedsl_bs64_conc256 (ctx side, sat conc256).
# GEN source: scripts/configs/gen-only 2ctxDEP4_1genTEP4_bs64_conc64 (gen side, sat conc64).
# E2E_C = n_gen x per_gen_sat = 3x64 = 192; sysc = 1.5x = 288 (bench concurrency).
# Transforms vs source workers: ctx chunked_prefill 0->1 & buf 16384->8192; gen bs 64->80 & buf 16384->8192;
#   FlashInfer GDN prefill env (prefill=1/decode=0); TLLM_PROFILE_LOG_RANKS=all; adaptive num_prompts/num_warmups.
