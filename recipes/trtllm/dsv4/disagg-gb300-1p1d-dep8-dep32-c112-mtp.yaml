# benchmark:
#     type: manual
benchmark:
  type: custom
  client_placement: last_decode
  env:
    AIPERF_REF: git+https://github.com/SemiAnalysisAI/aiperf.git@0d2aa0572ac685943d38c580675c4a61023581d3
    # AIPERF_VENV: /scratch/fsw/portfolios/coreai/projects/coreai_comparch_inferencex/users/gluo/hf_cache/.agentx-aiperf-venv
    HF_HUB_CACHE: /lustre/fsw/portfolios/coreai/projects/coreai_comparch_inferencex/users/rihuo/hf_cache
    HF_HOME: /lustre/fsw/portfolios/coreai/projects/coreai_comparch_inferencex/users/rihuo/hf_cache
    AIPERF_DATASET_MMAP_CACHE_DIR: /lustre/fsw/portfolios/coreai/projects/coreai_comparch_inferencex/users/rihuo/hf_cache/aiperf_mmap
    AIPERF_DATASET_CONFIGURATION_TIMEOUT: '1800'
    AIPERF_SERVICE_PROFILE_CONFIGURE_TIMEOUT: '1800'
  command: |
    set -euo pipefail
    pip install -q --upgrade pip
    pip install -q "aiperf @ $AIPERF_REF" "datasets>=4.7.0" "huggingface_hub[cli]>=0.25.0"
    mkdir -p /logs/agentic/concurrency_112
    aiperf profile --scenario inferencex-agentx-mvp \
      --url http://$SRT_FRONTEND_HOST:$SRT_FRONTEND_PORT --endpoint /v1/chat/completions --endpoint-type chat --streaming \
      --model deepseek-ai_DeepSeek-V4-Pro --tokenizer /model --tokenizer-trust-remote-code \
      --public-dataset semianalysis_cc_traces_weka_062126 \
      --num-dataset-entries 393 --slice-duration 1.0 \
      --trajectory-start-min-ratio 0.25 --trajectory-start-max-ratio 0.75 \
      --use-server-token-count --no-gpu-telemetry --random-seed 42 \
      --failed-request-threshold 0.10 \
      --benchmark-duration 3600 --concurrency 112 \
      --use-dynamo-conv-aware-routing \
      --output-artifact-dir /logs/agentic/concurrency_112
