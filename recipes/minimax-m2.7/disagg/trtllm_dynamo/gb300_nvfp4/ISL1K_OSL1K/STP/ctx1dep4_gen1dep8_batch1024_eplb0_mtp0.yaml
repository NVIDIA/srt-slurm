name: "minimax_m267_nvfp4_ISL1K_OSL1K_ctx1dep4_gen1dep8_batch1024_eplb0_mtp0"

# Validate gb300 benchmark: dep8-tp8, DNum=1, Conc=1024
# Expected: 103395.0 total tok/s, 11488.3 tok/s/gpu

model:
  path: "nvidia/MiniMax-M2.7-NVFP4"
  container: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.1.0-dev.3"
  precision: "fp4"

resources:
  gpu_type: "gb300"
  prefill_nodes: 1
  prefill_workers: 1
  gpus_per_prefill: 1
  decode_workers: 1
  decode_nodes: 2
  gpus_per_decode: 8
  gpus_per_node: 4

backend:
  type: trtllm

  trtllm_config:
    prefill:
      tensor_parallel_size: 1
      moe_expert_parallel_size: 1
      pipeline_parallel_size: 1
      trust_remote_code: true
      enable_attention_dp: false
      disable_overlap_scheduler: true
      max_num_tokens: 16000
      max_seq_len: 2048
      print_iter_log: true
      torch_compile_config:
        capture_num_tokens: [1, 2, 4, 8, 12, 16, 24, 32, 48, 64, 96, 128, 192, 256, 384, 512, 768, 1024, 1152, 1280, 1408, 1536, 1664, 1792, 1920, 2048, 2304, 2560, 2816, 3072, 3328, 3584, 3840, 4096, 4608, 5120, 5632, 6144, 6656, 7168, 7680, 8192, 8704, 9216, 9728, 10240, 10752, 11264, 11776, 12288, 12800, 13312, 13824, 14336, 14848, 15360, 15872]
        enable_piecewise_cuda_graph: true
      scheduler_config:
        capacity_scheduler_policy: MAX_UTILIZATION
        context_chunking_policy: FIRST_COME_FIRST_SERVED
      moe_config:
        backend: TRTLLM
      kv_cache_config:
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.9
        dtype: fp8
      cache_transceiver_config:
        backend: UCX
        max_tokens_in_buffer: 1024
        kv_transfer_timeout_ms: 300000

    decode:
      tensor_parallel_size: 8
      moe_expert_parallel_size: 8
      pipeline_parallel_size: 1
      trust_remote_code: true
      enable_attention_dp: true
      max_batch_size: 1024
      max_num_tokens: 1024
      max_seq_len: 2048
      print_iter_log: true
      stream_interval: 100
      num_postprocess_workers: 4
      cuda_graph_config:
        enable_padding: true
        batch_sizes:
          - 1
          - 2
          - 4
          - 8
          - 12
          - 16
          - 24
          - 32
          - 40
          - 48
          - 56
          - 64
          - 72
          - 80
          - 88
          - 96
          - 104
          - 112
          - 120
          - 128
          - 136
          - 144
          - 152
          - 160
          - 168
          - 176
          - 184
          - 192
          - 200
          - 208
          - 216
          - 224
          - 232
          - 240
          - 248
          - 256
          - 272
          - 288
          - 304
          - 320
          - 336
          - 352
          - 368
          - 384
          - 400
          - 416
          - 432
          - 448
          - 464
          - 480
          - 496
          - 512
          - 544
          - 576
          - 608
          - 640
          - 672
          - 704
          - 736
          - 768
          - 832
          - 896
          - 960
          - 1024
      moe_config:
        backend: TRTLLM
      kv_cache_config:
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.9
        dtype: fp8
      cache_transceiver_config:
        backend: UCX
        max_tokens_in_buffer: 1024
        kv_transfer_timeout_ms: 300000

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "1024"
  req_rate: "inf"

frontend:
  type: "dynamo"
  enable_multiple_frontends: false

health_check:
  max_attempts: 360
  interval_seconds: 10

dynamo:
  install: false
