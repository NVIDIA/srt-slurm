# Mocker smoke test - Disaggregated mode
# Validates prefill/decode disaggregation pipeline with separate nodes
# and bootstrap rendezvous.
#
# Usage:
#   srtctl apply -f recipes/mocker/disagg.yaml
#   srtctl dry-run -f recipes/mocker/disagg.yaml

name: "smoke-test-disagg"

slurm:
  time_limit: "00:15:00"

model:
  path: "hf:Qwen/Qwen3-0.6B"
  container: "dynamo-sglang"
  precision: "fp16"

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 1
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 1
  gpus_per_decode: 1

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: mocker
  speedup_ratio: 100
  engine_type: vllm

  mocker_config:
    prefill:
      num-gpu-blocks-override: 8192
      max-num-seqs: 128
      max-num-batched-tokens: 16384
      enable-chunked-prefill: true
    decode:
      num-gpu-blocks-override: 16384
      max-num-seqs: 512
      max-num-batched-tokens: 4096

benchmark:
  type: "sa-bench"
  isl: 128
  osl: 128
  concurrencies: "4"
