name: disagg-b300-8k-2p3d-dep4-tep8-b32-mtp3
identity:
  model:
    repo: deepseek-ai/DeepSeek-V4-Pro
  container:
    image: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc21
  frameworks:
    tensorrt_llm: 1.3.0rc21
model:
  path: dsv4-pro
  container: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc21
  precision: fp4
dynamo:
  install: true
  wheel: "1.3.0.dev2026071601"
  request_plane: tcp
resources:
  gpu_type: b300
  prefill_nodes: 2
  prefill_workers: 2
  gpus_per_prefill: 4
  decode_nodes: 3
  decode_workers: 3
  gpus_per_decode: 8
  gpus_per_node: 8
backend:
  type: trtllm
  prefill_environment:
    TLLM_LOG_LEVEL: INFO
    TRTLLM_SERVER_DISABLE_GC: '1'
    TRTLLM_WORKER_DISABLE_GC: '1'
    TRTLLM_ENABLE_PDL: '1'
    ENROOT_ALLOW_DEV: 'yes'
    NCCL_GRAPH_MIXING_SUPPORT: '0'
    MIMALLOC_PURGE_DELAY: '0'
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    TLLM_PROFILE_LOG_RANKS: all
    TLLM_METRICS_ALL_RANKS: '1'
    UCX_TLS: rc,cuda_copy,sm,self
    UCX_MAX_RNDV_RAILS: '1'
    UCX_MAX_EAGER_RAILS: '1'
  decode_environment:
    TLLM_LOG_LEVEL: INFO
    TRTLLM_SERVER_DISABLE_GC: '1'
    TRTLLM_WORKER_DISABLE_GC: '1'
    TRTLLM_ENABLE_PDL: '1'
    ENROOT_ALLOW_DEV: 'yes'
    NCCL_GRAPH_MIXING_SUPPORT: '0'
    MIMALLOC_PURGE_DELAY: '0'
    TLLM_PROFILE_LOG_RANKS: all
    TLLM_SPEC_DECODE_FORCE_NUM_ACCEPTED_TOKENS: '1.82'
    UCX_TLS: rc,cuda_copy,sm,self
    UCX_MAX_RNDV_RAILS: '1'
    UCX_MAX_EAGER_RAILS: '1'
  trtllm_config:
    prefill:
      cache_transceiver_config:
        backend: NIXL
        kv_transfer_timeout_ms: 600000
        transceiver_runtime: PYTHON
      cuda_graph_config:
      disable_overlap_scheduler: true
      enable_attention_dp: true
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.5
        tokens_per_block: 128
      max_batch_size: 2
      max_num_tokens: 8320
      max_seq_len: 8232
      moe_config:
        backend: TRTLLM
      moe_expert_parallel_size: 4
      pipeline_parallel_size: 1
      print_iter_log: true
      speculative_config:
        decoding_type: MTP
        max_draft_len: 3
      tensor_parallel_size: 4
    decode:
      cache_transceiver_config:
        backend: NIXL
        kv_transfer_timeout_ms: 600000
        transceiver_runtime: PYTHON
      cuda_graph_config:
        batch_sizes:
        - 1
        - 2
        - 4
        - 8
        - 16
        - 24
        - 32
        enable_padding: true
      enable_attention_dp: false
      enable_lm_head_tp_in_adp: false
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.9
        tokens_per_block: 128
      max_batch_size: 32
      max_num_tokens: 128
      max_seq_len: 9256
      moe_config:
        backend: TRTLLM
        use_low_precision_moe_combine: true
      moe_expert_parallel_size: 8
      num_postprocess_workers: 4
      pipeline_parallel_size: 1
      print_iter_log: true
      speculative_config:
        decoding_type: MTP
        max_draft_len: 3
      stream_interval: 100
      tensor_parallel_size: 8
benchmark:
  type: sa-bench
  isl: 8192
  osl: 1024
  concurrencies: '144'
  req_rate: inf
  random_range_ratio: 0.8
  use_chat_template: false
  dataset_name: custom
  dataset_path: /lustre/fsw/coreai_comparch_infbench/shixiangx/dataset/random-v2/DeepSeek-V4-8192-1024-200000-ratio-08_for_serve.json
frontend:
  type: dynamo
  enable_multiple_frontends: false
slurm:
  time_limit: '3:00:00'
health_check:
  max_attempts: 360
  interval_seconds: 10
environment:
  TRTLLM_SERVER_DISABLE_GC: '1'
