name: "minimax-m3-vllm-disagg-b300-4p4d-fp8-dep2-tep4-8k1k"

model:
  path: "/lustre/fsw/portfolios/coreai/projects/coreai_comparch_inferencex/users/rihuo/MiniMaxAI_MiniMax-M3-MXFP8"
  container: "/lustre/fsw/portfolios/coreai/projects/coreai_comparch_inferencex/users/rihuo/vllm-openai-minimax-m3.sqsh"
  precision: "fp8"

setup_script: install_minimax_dynamo_wheel.sh

extra_mount:
  - "/lustre/fsw/portfolios/coreai/projects/coreai_comparch_inferencex/users/rihuo/minimax_wheels:/wheels"

resources:
  gpu_type: "b300"
  gpus_per_node: 8
  prefill_nodes: 1
  decode_nodes: 2
  prefill_workers: 4
  decode_workers: 4
  gpus_per_prefill: 2
  gpus_per_decode: 4

dynamo:
  install: false

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_FLOAT32_MATMUL_PRECISION: high
    UCX_NET_DEVICES: "ibp198s0f0:1,ibp199s0f0:1"
    UCX_TLS: "rc,cuda_copy,cuda_ipc,self"
    UCX_LOG_LEVEL: info

  decode_environment:
    VLLM_FLOAT32_MATMUL_PRECISION: high
    UCX_NET_DEVICES: "ibp198s0f0:1,ibp199s0f0:1"
    UCX_TLS: "rc,cuda_copy,cuda_ipc,self"
    UCX_LOG_LEVEL: info

  vllm_config:
    prefill:
      tensor-parallel-size: 1
      data-parallel-size: 2
      data-parallel-rpc-port: 13345
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 9472
      language-model-only: true
      stream-interval: 32
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 16384

    decode:
      tensor-parallel-size: 4
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 9472
      language-model-only: true
      stream-interval: 32
      max-num-seqs: 512
      max-num-batched-tokens: 16384
      max-cudagraph-capture-size: 4096

health_check:
  max_attempts: 360
  interval_seconds: 10

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "4x8x16x32x64x128x256x512x1024x2048x4096"
  req_rate: "inf"
