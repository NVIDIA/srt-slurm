name: "minimax-m3-vllm-disagg-gb300-1p1d-fp8-8k1k"

model:
  path: "/data/home/rihuo/MiniMaxAI_MiniMax-M3-MXFP8"
  container: "/data/home/rihuo/dynamo-vllm-arm64-minimax-m3-dev1.sqsh"
  precision: "fp8"

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 1
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 4
  gpus_per_decode: 4

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    UCX_NET_DEVICES: "all"

  decode_environment:
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    UCX_NET_DEVICES: "all"

  vllm_config:
    prefill:
      tensor-parallel-size: 4
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      kv-cache-dtype: "fp8"
      block-size: 128
      attention-backend: "FLASH_ATTN"
      gpu-memory-utilization: 0.95
      max-model-len: 9280
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 16384

    decode:
      tensor-parallel-size: 4
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      block-size: 128
      max-num-batched-tokens: 2048
      gpu-memory-utilization: 0.95
      max-model-len: 9280

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "256x512x1024"
  req_rate: "inf"
