name: "minimax-m3-vllm-disagg-gb300-1p1d-fp8-8k1k"

model:
  path: "/data/home/rihuo/MiniMaxAI_MiniMax-M3-MXFP8"
  container: "/data/home/rihuo/dynamo-vllm-arm64-minimax-m3-dev1.sqsh"
  precision: "fp8"

setup_script: setup_nixl.sh

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 1
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 4
  gpus_per_decode: 4

dynamo:
  install: false

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    UCX_NET_DEVICES: "all"

  decode_environment:
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    UCX_NET_DEVICES: "all"

  vllm_config:
    prefill:
      tensor-parallel-size: 4
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      attention-backend: "FLASH_ATTN"
      block-size: 128
      gpu-memory-utilization: 0.95
      max-model-len: 2048
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 2048

    decode:
      tensor-parallel-size: 4
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      attention-backend: "FLASH_ATTN"
      gpu-memory-utilization: 0.95
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY"}'
      enable-expert-parallel: true
      block-size: 128
      max-num-batched-tokens: 2048
      max-cudagraph-capture-size: 2048
      max-model-len: 2048

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "1x2x4x8x16x32x64x128x256x512x1024"
  req_rate: "inf"
