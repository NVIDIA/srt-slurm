name: "minimax-m3-vllm-disagg-b300-2p4d-fp8-mid-low-dep8-tep8-1k1k"

model:
  path: "/lustre/fsw/coreai_comparch_inferencex/rihuo/MiniMaxAI_MiniMax-M3-MXFP8"
  container: "/lustre/fsw/coreai_comparch_inferencex/rihuo/vllm-openai-minimax-m3.sqsh"
  precision: "fp8"

setup_script: install_minimax_dynamo_wheel.sh

extra_mount:
  - "/lustre/fsw/coreai_comparch_inferencex/rihuo/minimax_wheels:/wheels"

resources:
  gpu_type: "b300"
  gpus_per_node: 8
  prefill_nodes: 2
  decode_nodes: 4
  prefill_workers: 2
  decode_workers: 4
  gpus_per_prefill: 8
  gpus_per_decode: 8

dynamo:
  install: false

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    UCX_NET_DEVICES: "all"
    UCX_TLS: "rc,cuda_ipc,cuda_copy,sm,self,tcp"

  decode_environment:
    UCX_NET_DEVICES: "all"
    UCX_TLS: "rc,cuda_ipc,cuda_copy,sm,self,tcp"

  vllm_config:
    prefill:
      tensor-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 2304
      language-model-only: true
      stream-interval: 32
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 2048

    decode:
      tensor-parallel-size: 8
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 2304
      language-model-only: true
      stream-interval: 32
      max-num-seqs: 1024
      max-num-batched-tokens: 16384
      max-cudagraph-capture-size: 8196

health_check:
  max_attempts: 360
  interval_seconds: 10

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "4x8x16x32x64x128x256x512x1024x2048x4096"
  req_rate: "inf"
