name: "dsv4-vllm-disagg-gb200-1p1d-tep8-dep8-agentx060826"

sweep:
  conc: [16, 32, 64, 128, 256]

model:
  path: "deepseekv4-fp4"
  container: "inferactinc/public:sprint-agentx-20260616"
  precision: "fp4"

identity:
  model:
    repo: "deepseek-ai/DeepSeek-V4-Pro"
  container:
    image: "inferactinc/public:sprint-agentx-20260616"
  frameworks:
    dynamo: "1.2.1"

dynamo:
  wheel: "1.2.1"
  install: true

setup_script: vllm-container-deps.sh

slurm:
  time_limit: "08:00:00"

health_check:
  max_attempts: 2160
  interval_seconds: 10

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 2
  decode_nodes: 2
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 8

infra:
  etcd_nats_dedicated_node: false
  nats_max_payload_mb: 32

frontend:
  type: dynamo
  enable_multiple_frontends: false

# Host paths below are placeholders — point them at your own checkouts/caches.
container_mounts:
  /path/to/InferenceX: /infmax-workspace
  /path/to/srt-slurm-sa: /workspace/srt-slurm-sa
  /path/to/aiperf-mmap-cache: /aiperf_mmap_cache
  /path/to/hf-models/hub: /hf_hub_cache

backend:
  type: vllm
  connector: null
  mooncake_kv_store:
    store_config:
      metadata_server: "P2PHANDSHAKE"
      global_segment_size: "100GB"
      local_buffer_size: "4GB"
      protocol: "rdma"
      device_name: "rocep139s0"  # RDMA NIC — set to your fabric's device
  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_RPC_TIMEOUT: "600000"
    VLLM_LOG_STATS_INTERVAL: "1"
    VLLM_V2_WARMUP_MAX_NUM_SEQS: "20"
    VLLM_SERVER_DEV_MODE: "1"
    VLLM_USE_RUST_FRONTEND: "1"
    VLLM_USE_FLASHINFER_MOE_FP8: "0"
    VLLM_ALLREDUCE_USE_SYMM_MEM: "0"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_RANDOMIZE_DP_DUMMY_INPUTS: "1"
    UCX_MEMTYPE_CACHE: "n"
    UCX_NET_DEVICES: "rocep139s0:1"  # RDMA NIC — set to your fabric's device
    NCCL_IB_HCA: "rocep139s0"        # RDMA NIC — set to your fabric's device
    UCX_TLS: "rc,cuda_copy"
    VLLM_PREFIX_CACHE_RETENTION_INTERVAL: "32768"
    MC_ENABLE_DEST_DEVICE_AFFINITY: "1"
    MC_STORE_CLIENT_METRIC: "0"
    MC_STORE_CLIENT_METRIC_INTERVAL: "5"
    MC_TE_METRIC: "0"
  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_RPC_TIMEOUT: "600000"
    VLLM_LOG_STATS_INTERVAL: "1"
    VLLM_V2_WARMUP_MAX_NUM_SEQS: "20"
    VLLM_SERVER_DEV_MODE: "1"
    VLLM_USE_RUST_FRONTEND: "1"
    VLLM_USE_FLASHINFER_MOE_FP8: "0"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_RANDOMIZE_DP_DUMMY_INPUTS: "1"
    UCX_MEMTYPE_CACHE: "n"
    UCX_NET_DEVICES: "rocep139s0:1"  # RDMA NIC — set to your fabric's device
    NCCL_IB_HCA: "rocep139s0"        # RDMA NIC — set to your fabric's device
    UCX_TLS: "rc,cuda_copy"
    VLLM_PREFIX_CACHE_RETENTION_INTERVAL: "32768"
    MC_ENABLE_DEST_DEVICE_AFFINITY: "1"
    MC_STORE_CLIENT_METRIC: "0"
    MC_STORE_CLIENT_METRIC_INTERVAL: "5"
    MC_TE_METRIC: "0"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector":"MultiConnector","kv_role":"kv_both","kv_connector_extra_config":{"connectors":[{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail","kv_buffer_device":"cuda","kv_connector_extra_config":{"enforce_handshake_compat":false,"enable_cross_layers_blocks":"true"}},{"kv_connector":"MooncakeStoreConnector","kv_role":"kv_both","kv_connector_extra_config":{"load_async":true,"enable_cross_layers_blocks":"true"}}]}}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 8
      pipeline-parallel-size: 1
      enable-expert-parallel: true
      enable-ep-weight-filter: true
      enforce-eager: true
      max-model-len: 1000000
      max-num-seqs: 16
      max-num-batched-tokens: 16384
      trust-remote-code: true
      no-enable-flashinfer-autotune: true
      block-size: 256
      gpu-memory-utilization: 0.88
      no-disable-hybrid-kv-cache-manager: true
      enable-sleep-mode: true
      tokenizer-mode: deepseek_v4
      attention_config: '{"use_fp4_indexer_cache":true}'
      moe-backend: "deep_gemm_mega_moe"
    decode:
      kv-transfer-config: '{"kv_connector":"MultiConnector","kv_role":"kv_both","kv_connector_extra_config":{"connectors":[{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail","kv_buffer_device":"cuda","kv_connector_extra_config":{"enforce_handshake_compat":false,"enable_cross_layers_blocks":"true"}},{"kv_connector":"MooncakeStoreConnector","kv_role":"kv_both","kv_connector_extra_config":{"load_async":true,"enable_cross_layers_blocks":"true"}}]}}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      enable-ep-weight-filter: true
      max-model-len: 1000000
      max-num-seqs: 64
      max-num-batched-tokens: 16384
      trust-remote-code: true
      no-enable-flashinfer-autotune: true
      block-size: 256
      gpu-memory-utilization: 0.88
      no-disable-hybrid-kv-cache-manager: true
      enable-sleep-mode: true
      tokenizer-mode: deepseek_v4
      attention_config: '{"use_fp4_indexer_cache":true}'
      moe-backend: "deep_gemm_mega_moe"

sbatch_directives:
  cpus-per-task: "72"

benchmark:
  type: custom
  command: bash /configs/agentx_060826_local_aiperf.sh
  env:
    INFMAX_CONTAINER_WORKSPACE: /infmax-workspace
    AGENTIC_DIR: /infmax-workspace/utils/agentic-benchmark
    AIPERF_DIR: /workspace/srt-slurm-sa/aiperf
    AIPERF_VENV: /workspace/srt-slurm-sa/aiperf/.venv
    RESULT_DIR: /logs/agentic
    AGENTIC_OUTPUT_DIR: /logs/agentic
    PORT: "8000"
    IS_MULTINODE: "true"
    MODEL: "deepseek-ai/DeepSeek-V4-Pro"
    MODEL_PREFIX: "dsv4"
    FRAMEWORK: "dynamo-vllm"
    PRECISION: "fp4"
    CONC: "{conc}"
    DURATION: "1800"
    RESULT_FILENAME: "dsv4_fp4_dynamo-vllm_prefill-tep8_decode-dep8_disagg-true_agentx060826_conc{conc}_local"
    RUNNER_TYPE: "gb200"
    SPEC_DECODING: "none"
    DISAGG: "true"
    OFFLOADING: "none"
    TP: "8"
    EP_SIZE: "8"
    DP_ATTENTION: "false"
    PREFILL_NUM_WORKERS: "1"
    PREFILL_TP: "8"
    PREFILL_EP: "8"
    PREFILL_DP_ATTN: "false"
    DECODE_NUM_WORKERS: "1"
    DECODE_TP: "8"
    DECODE_EP: "8"
    DECODE_DP_ATTN: "false"
    MAX_CONTEXT_LENGTH: "1000000"
    NUM_DATASET_ENTRIES: "472"
    PUBLIC_DATASET: "semianalysis_cc_traces_weka_with_subagents_060826"
    SLICE_DURATION: "1.0"
    VLLM_START_PROFILE_AFTER_SECONDS: "900"
    AIPERF_DATASET_MMAP_CACHE_DIR: "/aiperf_mmap_cache"
    HF_HUB_CACHE: "/hf_hub_cache"
