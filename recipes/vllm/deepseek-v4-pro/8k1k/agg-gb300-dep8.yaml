name: "svf-vllm-agg-gb300-dep8"
model:
  path: "deepseekv4-fp4"
  container: "vllm/vllm-openai:deepseekv4-cu130"
  precision: "fp4"

dynamo:
  hash: 6a159fedd8e4a1563aa647c31f622aedbf254b5b
  install: true

setup_script: vllm-container-deps.sh
health_check:
  max_attempts: 360
  interval_seconds: 10

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  agg_nodes: 2
  agg_workers: 1
  gpus_per_agg: 8
frontend:
  type: dynamo
  enable_multiple_frontends: false
backend:
  type: vllm
  connector: null
  aggregated_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_SERVER_DEV_MODE: "1"
    VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: "1024"
    VLLM_MAX_TOKENS_PER_EXPERT_FP4_MOE: "2048"
    VLLM_RANDOMIZE_DP_DUMMY_INPUTS: "1"
    VLLM_MOE_ROUTING_SIMULATION_STRATEGY: "uniform_random"
    NCCL_P2P_LEVEL: NVL
  vllm_config:
    aggregated:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      compilation-config: '{"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}'
      attention-config: '{"use_fp4_indexer_cache":true}'
      tokenizer-mode: deepseek_v4
      reasoning-parser: deepseek_v4
      max-model-len: 9300
      max-num-batched-tokens: 8192
      max-cudagraph-capture-size: 2048
      trust-remote-code: true
      no-enable-prefix-caching: true
      block-size: 256
benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "1x2x4x8x16x32x64x128x256x512x1024x2048"
  req_rate: "inf"
  tokenizer_mode: "deepseek_v4"
  use_chat_template: true
