name: "dsv4-vllm-disagg-gb300-1p1d-dep4-dep4"

model:
  path: "deepseek-v4-pro"
  container: "inferactinc/dev:svf-arm64-cu130-20260426010012"
  precision: "fp4"

# dynamo:
#   hash: 6a159fedd8e4a1563aa647c31f622aedbf254b5b
#   # Install handled by our custom vllm-container-deps.sh, which builds
#   # the dynamo wheel ONCE on /mnt/vast and lets every rank pip-install
#   # from cache. See runners/gb300-cw-vllm-container-deps.sh.
#   install: false
dynamo:
  version: 1.0.2
  install: true

setup_script: vllm-container-deps.sh

slurm:
  time_limit: "3:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  prefill_nodes: 6
  decode_nodes: 4
  prefill_workers: 6
  decode_workers: 1
  gpus_per_prefill: 4
  gpus_per_decode: 8

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_LOG_STATS_INTERVAL: "1"
    VLLM_RANDOMIZE_DP_DUMMY_INPUTS: "1"
    VLLM_MOE_ROUTING_SIMULATION_STRATEGY: "uniform_random"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    NCCL_P2P_LEVEL: NVL
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

  decode_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_LOG_STATS_INTERVAL: "1"
    VLLM_RANDOMIZE_DP_DUMMY_INPUTS: "1"
    VLLM_MOE_ROUTING_SIMULATION_STRATEGY: "uniform_random"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    NCCL_P2P_LEVEL: NVL
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      enforce-eager: true
      max-model-len: 16384
      max-num-seqs: 10
      max-num-batched-tokens: 81920
      trust-remote-code: true
      no-enable-prefix-caching: true
      no-enable-flashinfer-autotune: true
      safetensors-load-strategy: "prefetch"
      no-async-scheduling: true
      block-size: 256
      gpu-memory-utilization: 0.92
      no-disable-hybrid-kv-cache-manager: true
      numa-bind: true
      offload-group-size: 3
      offload-num-in-group: 1
      offload-prefetch-step: 2
      tokenizer-mode: deepseek_v4
      enable-ep-weight-filter: true
      enable-sleep-mode: true

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      max-model-len: 16384
      max-num-seqs: 256
      max-cudagraph-capture-size: 256
      max-num-batched-tokens: 256
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      block-size: 256
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      gpu-memory-utilization: 0.9
      stream-interval: 50
      no-disable-hybrid-kv-cache-manager: true
      tokenizer-mode: deepseek_v4
      enable-ep-weight-filter: true
      all2all-backend: "flashinfer_nvlink_one_sided"
      enable-sleep-mode: true

benchmark:
  type: "vllm-bench"
  isl: 8192
  osl: 1024
  concurrencies: "1024x2048"
  num_warmups: 256