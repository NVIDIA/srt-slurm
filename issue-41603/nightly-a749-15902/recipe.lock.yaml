    TORCH_SYMMMEM: "NVSHMEM"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_SERVER_DEV_MODE: "1"
